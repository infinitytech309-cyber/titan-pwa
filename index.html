<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇧🇩 Bangla ChatBot</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --user-bubble: #3b82f6;
            --bot-bubble: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --send-btn: #3b82f6;
            --send-hover: #2563eb;
            --scrollbar: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans Bengali', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            max-height: 750px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* Header */
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .header-info h2 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-info p {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text);
        }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .message.bot .msg-avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }

        .message.user .msg-avatar {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.bot .msg-bubble {
            background: var(--bot-bubble);
            border-bottom-left-radius: 4px;
        }

        .message.user .msg-bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.user .msg-time {
            text-align: right;
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: var(--bot-bubble);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-6px); }
        }

        /* Quick chips */
        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 20px 4px;
        }

        .chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .chip:hover {
            background: var(--border);
            color: var(--text);
            border-color: var(--accent);
        }

        /* Input area */
        .chat-input-area {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: var(--text);
            font-size: 14px;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: var(--accent);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: none;
            background: var(--send-btn);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: var(--send-hover);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Welcome */
        .welcome-message {
            text-align: center;
            padding: 30px 10px;
        }

        .welcome-message .big-emoji {
            font-size: 60px;
            display: block;
            margin-bottom: 14px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .welcome-message h3 {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .welcome-message p {
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .chat-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }

            body {
                padding: 0;
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="bot-avatar">🤖</div>
            <div class="header-info">
                <h2>Bangla ChatBot</h2>
                <p><span class="status-dot"></span> Online</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="clearChat()" title="Clear Chat">🗑️</button>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <span class="big-emoji">👋</span>
                <h3>স্বাগতম!</h3>
                <p>আমি আপনার সহায়ক চ্যাটবট। আমাকে যেকোনো কিছু জিজ্ঞাসা করুন!</p>
            </div>
        </div>

        <!-- Quick Chips -->
        <div class="quick-chips" id="quickChips">
            <button class="chip" onclick="sendQuick('তোমার নাম কী?')">👤 নাম কী?</button>
            <button class="chip" onclick="sendQuick('তুমি কী করতে পারো?')">💪 কী করতে পারো?</button>
            <button class="chip" onclick="sendQuick('আজকের তারিখ কী?')">📅 আজকের তারিখ</button>
            <button class="chip" onclick="sendQuick('একটি কৌতুক বলো')">😂 কৌতুক</button>
            <button class="chip" onclick="sendQuick('ধন্যবাদ')">🙏 ধন্যবাদ</button>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <textarea 
                class="chat-input" 
                id="chatInput" 
                placeholder="আপনার মেসেজ লিখুন..."
                rows="1"
                onkeydown="handleKeyDown(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // ============ CHATBOT KNOWLEDGE BASE ============
        const knowledgeBase = [
            // --- Greetings ---
            { 
                keywords: ['হাই', 'hello', 'hi', 'hey', 'হ্যালো', 'নমস্কার', 'আসসালামু আলাইকুম', 'assalamu', 'স্লাম', 'good morning', 'good evening', 'শুভ সকাল', 'শুভ সন্ধ্যা', 'sup'],
                response: 'হ্যালো! 👋 আমি কেমন আছি বলুন তো? আপনার জন্য কী করতে পারি?'
            },
            { 
                keywords: ['কেমন আছো', 'কেমন আছ', 'how are you', 'kemon acho', 'kemon aso'],
                response: 'আমি দারুণ আছি! 🎉 আপনি কেমন আছেন?'
            },
            { 
                keywords: ['ভালো আছি', 'ভাল আছি', 'I am fine', 'fine', 'আমি ভালো'],
                response: 'জেনে খুশি হলাম! 😊 আমাকে আর কী বলবেন?'
            },

            // --- Identity ---
            { 
                keywords: ['তোমার নাম কী', 'তোমার নাম', 'তুই কে', 'who are you', 'what is your name', 'তোমাকে কে বানিয়েছে', 'কে বানিয়েছে'],
                response: 'আমার নাম **Bangla ChatBot**! 🤖 আমাকে বানানো হয়েছে HTML, CSS, আর JavaScript দিয়ে। আমি বাংলা ও ইংরেজি দুই ভাষাতেই কথা বলতে পারি!'
            },
            { 
                keywords: ['তুমি কী করতে পারো', 'তুমি কী পারো', 'what can you do', 'কী কী জানো', 'capabilities', 'features'],
                response: 'আমি করতে পারি:\n\n✅ প্রশ্নের উত্তর দেওয়া\n✅ কৌতুক বলা\n✅ তারিখ/সময় জানানো\n✅ কবিতা বলা\n✅ অনুপ্রেরণামূলক উক্তি\n✅ সাধারণ জ্ঞান শেয়ার করা\n✅ আরও অনেক কিছু!\n\nআপনি কী জানতে চান? 😊'
            },

            // --- Date & Time ---
            { 
                keywords: ['আজকের তারিখ', 'তারিখ কত', 'আজ কত তারিখ', 'what is the date', "today's date", 'আজ কী বার', 'what day', 'কয় তারিখ'],
                response: () => {
                    const d = new Date();
                    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    const bdDate = d.toLocaleDateString('bn-BD', options);
                    const enDate = d.toLocaleDateString('en-US', options);
                    return `আজকের তারিখ: **${bdDate}**\n\n(Today: ${enDate})`;
                }
            },
            { 
                keywords: ['সময়', 'time', 'এখন কয়টা', 'কয়টা বাজে', 'what time', "what's the time"],
                response: () => {
                    const d = new Date();
                    const time = d.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    return `এখন সময়: **${time}** ⏰`;
                }
            },

            // --- Jokes ---
            { 
                keywords: ['কৌতুক', 'joke', 'মজা', 'funny', 'হাসি', 'laugh', 'হাসান'],
                response: () => {
                    const jokes = [
                        '😄 **ডাক্তার:** আপনার ওজন কত?\n**রোগী:** চশমা ছাড়া ৫২, চশমাসহ ৭২!\n**ডাক্তার:** 😳 কেন?\n**রোগী:** চশমাটার ওজন ২০ কেজি!',
                        '🤣 **শিক্ষক:** "গরু" দিয়ে একটা বাক্য তৈরি করো।\n**ছাত্র:** গরু একটি উপকারী প্রাণী।\n**শিক্ষক:** "মহিষ" দিয়ে?\n**ছাত্র:** গরু একটি উপকারী প্রাণী কিন্তু মহিষ নয়।',
                        '😂 **বউ:** তোমার তো কিছুই ভালো লাগে না!\n**স্বামী:** তোমাকে তো ভালো লেগেছিল... ভুলটা সেখানেই!',
                        '🙃 Why did the JavaScript developer wear glasses?\nBecause he couldn\'t C#!',
                        '😆 **প্রোগ্রামার:** আমার wife রাগ করলে কী করবো?\n**বন্ধু:** console.log("I love you");\n**প্রোগ্রামার:** কিন্তু ও তো console এ দেখবে না!\n**বন্ধু:** তাহলে alert() দাও — ও বার বার OK করতেই থাকবে!',
                        '🤪 Why do programmers prefer dark mode?\nBecause light attracts bugs! 🐛'
                    ];
                    return jokes[Math.floor(Math.random() * jokes.length)];
                }
            },

            // --- Poems ---
            { 
                keywords: ['কবিতা', 'poem', 'ছড়া', 'rhyme', 'কবি'],
                response: () => {
                    const poems = [
                        '📝 **বাংলা আমার**\n\nবাংলা আমার মায়ের ভাষা,\nবাংলা আমার ভালোবাসা।\nবাংলা ভাষায় কথা বলি,\nবাংলা গানে সুর তুলি।\n\nবাংলা আমার অহংকার,\nবাংলা ছাড়া জীবন আঁধার। 🇧🇩',
                        '📝 **নদী**\n\nনদী চলে বাঁকে বাঁকে,\nপাখি ডাকে ডালে ডালে।\nফুল ফোটে ভোরে ভোরে,\nমন ভরে সুরে সুরে।',
                        '📝 **প্রজাপতি**\n\nউড়ে যায় প্রজাপতি,\nরঙিন তার পাখা।\nফুল থেকে ফুলে যায়,\nমনটা তার নাচা। 🦋'
                    ];
                    return poems[Math.floor(Math.random() * poems.length)];
                }
            },

            // --- Quotes ---
            { 
                keywords: ['উক্তি', 'quote', 'বাণী', 'অনুপ্রেরণা', 'motivation', 'মনীষী', 'inspirational'],
                response: () => {
                    const quotes = [
                        '🌟 **রবীন্দ্রনাথ ঠাকুর:** "যে আনন্দ পেতে চায়, সে আগে আনন্দ দিতে শেখো।"',
                        '🚀 **ড. মুহাম্মদ ইউনূস:** "দারিদ্র্য মানুষের সৃষ্টি, তাই মানুষই তা দূর করতে পারে।"',
                        '💪 **এপিজে আবদুল কালাম:** "স্বপ্ন সেটা নয় যেটা তুমি ঘুমিয়ে দেখো, স্বপ্ন সেটাই যেটা তোমাকে ঘুমাতে দেয় না।"',
                        '✨ **কাজী নজরুল ইসলাম:** "আমি চিরতরে দূরে চলে যাব, তবু আমারে দেব না ভুলিতে।"',
                        '🔥 "The only way to do great work is to love what you do." — Steve Jobs'
                    ];
                    return quotes[Math.floor(Math.random() * quotes.length)];
                }
            },

            // --- Facts ---
            { 
                keywords: ['তথ্য', 'fact', 'জানা', 'interesting', 'মজার তথ্য', 'জেনারেল নলেজ', 'gk'],
                response: () => {
                    const facts = [
                        '🧠 **জানেন কি?** মানুষের মস্তিষ্কের ৭৫% হলো পানি!\n(75% of your brain is water!)',
                        '🌍 **জানেন কি?** বাংলাদেশ পৃথিবীর সবচেয়ে বড় ব-দ্বীপ (delta)!',
                        '🐝 **জানেন কি?** মৌমাছি কখনো ঘুমায় না!\n(Honey bees never sleep!)',
                        '🏏 **জানেন কি?** বাংলাদেশ ২০০০ সালে টেস্ট ক্রিকেট স্ট্যাটাস পায়।',
                        '📱 **Fact:** The first mobile phone call was made in 1973 by Martin Cooper.'
                    ];
                    return facts[Math.floor(Math.random() * facts.length)];
                }
            },

            // --- Weather (simulation) ---
            { 
                keywords: ['আবহাওয়া', 'weather', 'গরম', 'ঠান্ডা', 'বৃষ্টি', 'তাপমাত্রা', 'temperature'],
                response: () => {
                    const temp = Math.floor(Math.random() * 15) + 25;
                    const conditions = ['☀️ রৌদ্রোজ্জ্বল', '⛅ আংশিক মেঘলা', '🌧️ বৃষ্টি', '🌩️ ঝড়', '🌙 পরিষ্কার আকাশ'];
                    const cond = conditions[Math.floor(Math.random() * conditions.length)];
                    return `বর্তমান আবহাওয়া: ${cond}\nতাপমাত্রা: প্রায় **${temp}°C**\n\n(এটি একটি সিমুলেটেড ডেটা! সঠিক তথ্যের জন্য আবহাওয়া অ্যাপ দেখুন।)`;
                }
            },

            // --- Thanks ---
            { 
                keywords: ['ধন্যবাদ', 'thanks', 'thank you', 'থ্যাংক ইউ', 'থ্যাংকস', 'tnx', 'thx'],
                response: 'আপনাকেও অসংখ্য ধন্যবাদ! ❤️ আবার কথা হবে!'
            },

            // --- Bye ---
            { 
                keywords: ['বিদায়', 'bye', 'goodbye', 'tata', 'আল্লাহ হাফেজ', 'খোদা হাফেজ', 'see you'],
                response: 'আল্লাহ হাফেজ! 👋 ভালো থাকবেন। আবার আসবেন!'
            },

            // --- Help ---
            { 
                keywords: ['সাহায্য', 'help', 'সাপোর্ট', 'support', 'guidance'],
                response: 'আমি আপনাকে কীভাবে সাহায্য করতে পারি?\n\nপ্রশ্ন করতে পারেন:\n🔹 কৌতুক / জোকস\n🔹 কবিতা\n🔹 উক্তি\n🔹 মজার তথ্য\n🔹 তারিখ / সময়\n🔹 আবহাওয়া\n\nকী জানতে চান? 😊'
            },

            // --- Bangladesh ---
            { 
                keywords: ['বাংলাদেশ', 'bangladesh', 'bd', 'ঢাকা', 'dhaka'],
                response: '🇧🇩 **বাংলাদেশ** — দক্ষিণ এশিয়ার একটি সুন্দর দেশ!\n\n- রাজধানী: ঢাকা\n- মুক্তিযুদ্ধ: ১৯৭১\n- ভাষা আন্দোলন: ১৯৫২\n- জাতীয় ফুল: শাপলা\n- জাতীয় পশু: বেঙ্গল টাইগার 🐅\n- জাতীয় পাখি: দোয়েল\n\nবাংলাদেশ ❤️'
            },

            // --- General fallback ---
            { 
                keywords: ['তুমি কি মানুষ', 'তুমি কি রোবট', 'তুমি কি ai', 'are you human', 'are you robot', 'are you ai'],
                response: 'না, আমি রোবট নই... কিন্তু মানুষও নই! 😅\n\nআমি একটি **rule-based chatbot** — মানে আমাকে কিছু নির্দিষ্ট নিয়ম শেখানো হয়েছে। আমি AI নই, তাই সবকিছুর উত্তর জানি না। কিন্তু যা জানি, মন দিয়ে বলি! ❤️'
            },
        ];

        // ============ CHATBOT LOGIC ============
        function getBotResponse(userMessage) {
            const msg = userMessage.toLowerCase().trim();

            for (const item of knowledgeBase) {
                for (const keyword of item.keywords) {
                    if (msg.includes(keyword)) {
                        if (typeof item.response === 'function') {
                            return item.response();
                        }
                        return item.response;
                    }
                }
            }

            // Fallback responses
            const fallbacks = [
                '🤔 দুঃখিত, আমি এটি বুঝতে পারিনি। আপনি কি আবার বলবেন?\n\nআমি যেসব বিষয় জানি: কৌতুক, কবিতা, উক্তি, তারিখ, সময়, সাধারণ জ্ঞান, আবহাওয়া।',
                '😕 আমি এখনো ওই বিষয় শিখিনি! অন্য কিছু জিজ্ঞাসা করুন।\nকেমন হয় একটি **কৌতুক** শুনবেন? 😄',
                '🙂 আপনার কথাটা আমার ডাটাবেসে নেই। আপনি চাইলে আমাকে নতুন কিছু শেখাতে পারেন!\n\n*টিপস: "কৌতুক", "কবিতা", "উক্তি", "তথ্য" লিখে দেখুন!*',
                '❓ আমি নিশ্চিত নই বুঝতে পেরেছি কিনা। একটু সহজ করে বলবেন?'
            ];
            return fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }

        // ============ UI FUNCTIONS ============
        function getTime() {
            const d = new Date();
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            
            // Remove welcome message if present
            const welcome = messagesDiv.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            const avatarEmoji = sender === 'user' ? '👤' : '🤖';

            msgDiv.innerHTML = `
                <div class="msg-avatar">${avatarEmoji}</div>
                <div>
                    <div class="msg-bubble">${formatMessage(text)}</div>
                    <div class="msg-time">${getTime()}</div>
                </div>
            `;

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function formatMessage(text) {
            // Bold: **text** -> <strong>text</strong>
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Newlines -> <br>
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function showTyping() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            // Add user message
            addMessage(text, 'user');
            input.value = '';
            input.style.height = 'auto';

            // Show typing indicator
            showTyping();

            // Simulate bot thinking
            const delay = Math.random() * 1000 + 500; // 500-1500ms
            setTimeout(() => {
                hideTyping();
                const response = getBotResponse(text);
                addMessage(response, 'bot');
            }, delay);
        }

        function sendQuick(text) {
            document.getElementById('chatInput').value = text;
            sendMessage();
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }

        function clearChat() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = `
                <div class="welcome-message">
                    <span class="big-emoji">👋</span>
                    <h3>স্বাগতম!</h3>
                    <p>আমি আপনার সহায়ক চ্যাটবট। আমাকে যেকোনো কিছু জিজ্ঞাসা করুন!</p>
                </div>
            `;
        }
    </script>
